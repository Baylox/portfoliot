    <script>
      // Applique la couleur du néon (cyan/orange) avant le rendu pour éviter
      // tout flash. ?accent=orange permet de partager le contre-circuit.
      (function () {
        try {
          var accent =
            new URLSearchParams(location.search).get('accent') || localStorage.getItem('accent');
          document.documentElement.setAttribute(
            'data-accent',
            accent === 'orange' ? 'orange' : 'cyan',
          );
        } catch (e) {
          document.documentElement.setAttribute('data-accent', 'cyan');
        }
      })();
    </script>
