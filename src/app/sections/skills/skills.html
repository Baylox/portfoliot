<section class="section" id="competences">
  <div class="container">
    <div class="section-heading" appReveal>
      <span class="section-heading__index">02.</span>
      <h2>{{ t().title }}</h2>
    </div>

    <div class="skills-panel hud" appReveal>
      <div class="skills-panel__bar">
        <span class="skills-panel__title">skills.map — baylox-sh</span>
        <span class="skills-panel__status">SYS OK</span>
      </div>

      @for (group of skillGroups(); track group.icon) {
        <div class="skills-panel__row" [appReveal]="$index * 80">
          <div class="skills-panel__domain">
            <span class="skills-panel__index" aria-hidden="true">0{{ $index + 1 }}</span>
            <span class="skills-panel__icon">
              <app-icon [name]="group.icon" [size]="18" />
            </span>
            <h3>{{ group.title }}</h3>
          </div>
          <ul class="skills-panel__list">
            @for (skill of group.skills; track skill) {
              <li class="chip">{{ skill }}</li>
            }
          </ul>
        </div>
      }
    </div>
  </div>
</section>
